<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workforce Intelligence — Medika Nusantara PoC</title>
    <meta name="description" content="Rakamin Workforce Intelligence Platform — Skill Gap Analysis Proof of Concept for Medika Nusantara">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #FAFBFC; color: #1B1F24; -webkit-font-smoothing: antialiased; }
        .row-hover:hover { background: #F6F8FA !important; }
        .card-hover:hover { border-color: #0D9488 !important; }
        .bar-track { height: 6px; background: #F3F4F6; border-radius: 99px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
        details summary { cursor: pointer; list-style: none; }
        details summary::-webkit-details-marker { display: none; }
        button { font-family: inherit; }
        @media (max-width: 768px) {
            .grid-teams { grid-template-columns: 1fr !important; }
            .grid-employee { grid-template-columns: 1fr !important; }
            .metrics-row { flex-direction: column; }
            .detail-flex { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
    // ============================================================
    // DATA GENERATION
    // ============================================================
    const BRANCHES=["Jakarta HQ","Surabaya","Makassar","Medan","Bandung"];
    const DEPARTMENTS=["Sales","Warehouse & Distribution","IT & Systems","Finance & Accounting","Human Resources","Quality Assurance","Customer Service","Medical Affairs"];
    const STANDARD_ROLES={"Sales Representative":{skills:["Product Knowledge","Negotiation","CRM Software","Communication","Territory Management"],weights:[5,4,3,4,3]},"Warehouse Supervisor":{skills:["Inventory Management","Team Leadership","Safety Compliance","Basic IT","Logistics Planning"],weights:[5,4,5,2,3]},"Delivery Driver":{skills:["Route Planning","Vehicle Maintenance","Safety Compliance","Time Management","Basic IT"],weights:[4,3,5,4,2]},"HR Officer":{skills:["HRIS Management","Labor Law","Recruitment","Employee Relations","Data Analysis"],weights:[4,4,3,4,3]},"IT Support Specialist":{skills:["Network Administration","Troubleshooting","System Administration","Cybersecurity Basics","User Training"],weights:[4,5,4,3,3]},"Finance Analyst":{skills:["Financial Reporting","Excel Advanced","ERP Systems","Data Analysis","Budgeting"],weights:[5,4,3,4,4]},"QA Officer":{skills:["Quality Standards","Audit Procedures","Documentation","Regulatory Compliance","Data Analysis"],weights:[5,4,3,5,3]},"Customer Service Rep":{skills:["Communication","CRM Software","Problem Solving","Product Knowledge","Empathy"],weights:[5,3,4,4,4]},"Medical Affairs Specialist":{skills:["Pharmaceutical Knowledge","Regulatory Compliance","Communication","Clinical Data","Relationship Management"],weights:[5,5,4,4,3]},"Branch Manager":{skills:["Team Leadership","Strategic Planning","Financial Management","Stakeholder Communication","Operations Management"],weights:[5,4,4,4,5]}};
    const MESSY_TITLES={"Jakarta HQ":{"Sales Representative":"Sales Representative","Warehouse Supervisor":"WH Supervisor","IT Support Specialist":"IT Helpdesk","Finance Analyst":"Financial Analyst","HR Officer":"HR Specialist","QA Officer":"QA Officer","Customer Service Rep":"CS Representative","Medical Affairs Specialist":"Medical Representative","Branch Manager":"Regional Manager","Delivery Driver":"Driver"},"Surabaya":{"Sales Representative":"Senior Sales","Warehouse Supervisor":"Gudang Supervisor","IT Support Specialist":"IT Support","Finance Analyst":"Finance Staff","HR Officer":"HR Staff","QA Officer":"Quality Control","Customer Service Rep":"CS Staff","Medical Affairs Specialist":"MedRep","Branch Manager":"Kepala Cabang","Delivery Driver":"Driver Pengiriman"},"Makassar":{"Sales Representative":"Sales 2","Warehouse Supervisor":"Supervisor Gudang","IT Support Specialist":"IT Helpdesk","Finance Analyst":"Finance Admin","HR Officer":"HR Admin","QA Officer":"QC Officer","Customer Service Rep":"CS Rep","Medical Affairs Specialist":"Medical Rep","Branch Manager":"Branch Manager","Delivery Driver":"Pengirim"},"Medan":{"Sales Representative":"Salesperson","Warehouse Supervisor":"Warehouse Supervisor","IT Support Specialist":"IT Support Specialist","Finance Analyst":"Finance Staff","HR Officer":"HR Staff","QA Officer":"QA Officer","Customer Service Rep":"Customer Service Staff","Medical Affairs Specialist":"Medical Affairs Specialist","Branch Manager":"Branch Manager","Delivery Driver":"Delivery Driver"},"Bandung":{"Sales Representative":"Sales Exec","Warehouse Supervisor":"Warehouse Lead","IT Support Specialist":"IT Support","Finance Analyst":"Finance Analyst","HR Officer":"HR Officer","QA Officer":"Quality Assurance Officer","Customer Service Rep":"CS Representative","Medical Affairs Specialist":"Medical Representative","Branch Manager":"Branch Manager","Delivery Driver":"Driver Delivery"}};
    const FN=["Adi","Budi","Citra","Dewi","Eka","Fajar","Gita","Hendra","Indra","Joko","Kartika","Lina","Mega","Nadia","Omar","Putri","Rizky","Sari","Tono","Umi","Vina","Wahyu","Yanti","Zahra","Arif","Bayu","Dian","Fitri","Gunawan","Hani","Irfan","Jasmine","Kukuh","Laras","Mira","Nur","Pandu","Ratna","Surya","Tari","Udin","Vera","Wulan","Yusuf","Zaki","Ayu","Bambang","Cahya","Dimas","Endah"];
    const LN=["Pratama","Wijaya","Susanto","Hidayat","Nugroho","Sari","Putri","Wibowo","Setiawan","Rahayu","Santoso","Kurniawan","Utami","Permana","Hartono","Lestari","Saputra","Kusuma","Purnama","Handayani","Firmansyah","Anggraeni","Prasetyo","Maharani","Ramadhan","Fitriani","Hakim","Suryadi","Mulyani","Cahyani"];

    function sr(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
    function gen(){const r=sr(42),roles=Object.keys(STANDARD_ROLES),emps=[];for(let i=0;i<200;i++){const br=BRANCHES[~~(r()*BRANCHES.length)],role=roles[~~(r()*roles.length)],fn=FN[~~(r()*FN.length)],ln=LN[~~(r()*LN.length)],hy=2018+~~(r()*7),hm=1+~~(r()*12),hsk=r()>0.4,hp=r()>0.3&&hy<=2023,hlms=r()>0.35,hats=r()>0.25,rd=STANDARD_ROLES[role],mt=(MESSY_TITLES[br]&&MESSY_TITLES[br][role])||role;let ms=null;if(hsk){const n=1+~~(r()*rd.skills.length);ms=rd.skills.slice(0,n).map(s=>({name:s,level:r()>0.3?~~(r()*3)+2:null}))}let mp=null;if(hp){const st=~~(r()*3);let rt;if(st===0)rt=~~(r()*5)+1;else if(st===1)rt=["A","B","C","D"][~~(r()*4)];else rt=~~(r()*10)+1;mp={rating:rt,year:2022+~~(r()*3)}}const hid=`EMP-${String(1000+i).padStart(4,"0")}`,aid=hats?`candidate_${600+~~(r()*900)}`:null,le=hlms?`${fn.toLowerCase()}.${ln.toLowerCase()}@medikanusantara.co.id`:null,cd=r()>0.85;const cs=rd.skills.map((s,idx)=>{let m,src;if(hsk&&ms&&ms.find(x=>x.name===s)){if(hlms&&r()>0.3){m=0.8;src="lms_verified"}else{m=0.6;src="training_enriched"}}else if(hlms&&r()>0.5){m=0.6;src="training_enriched"}else if(hp&&r()>0.4){m=0.4;src="performance_correlated"}else{m=0.3;src="role_inferred"}return{name:s,weight:rd.weights[idx],matchScore:m,source:src}});const gs=cs.reduce((a,s)=>a+s.weight*(1-s.matchScore),0)/cs.reduce((a,s)=>a+s.weight,0);let pc;if(hsk&&hlms&&hp)pc=0.75+r()*0.2;else if((hsk&&hlms)||(hsk&&hp))pc=0.55+r()*0.2;else if(hsk||hlms)pc=0.40+r()*0.2;else pc=0.15+r()*0.25;const np=hp?["Needs Improvement","Developing","Meets Expectations","Exceeds Expectations","Outstanding"][~~(r()*5)]:null,ic=le?(aid?0.95:0.85):(aid?0.75:0.60);emps.push({id:i+1,canonical_id:`RKM-MN-${String(i+1).padStart(5,"0")}`,name:`${fn} ${ln}`,branch:br,department:DEPARTMENTS[~~(r()*DEPARTMENTS.length)],standard_role:role,hire_date:`${hy}-${String(hm).padStart(2,"0")}-01`,tenure_years:2026-hy,messy:{job_title:mt,hris_id:hid,ats_id:aid,lms_email:le,skills:ms,performance:mp,has_conflicting_date:cd,ats_hire_date:cd?`${hy}-${String(Math.min(12,hm+1)).padStart(2,"0")}-15`:null},clean:{skills:cs,gap_score:Math.round(gs*100)/100,profile_confidence:Math.round(pc*100)/100,identity_confidence:ic,normalized_performance:np,top_gaps:cs.filter(s=>s.matchScore<0.5).sort((a,b)=>b.weight-a.weight).slice(0,3).map(s=>s.name),review_flags:[...(pc<0.5?["Low profile confidence"]:[]),...(cd?["Conflicting hire dates across systems"]:[]),...(ic<0.8?["Identity match needs verification"]:[])],needs_review:pc<0.5||cd||ic<0.8}})}return emps}
    const ALL=gen();

    // ============================================================
    // SVG ICONS
    // ============================================================
    const I={
        users:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
        shield:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
        check:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
        alert:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
        ac:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        eye:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
        cr:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
        al:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
        tu:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
        ton:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="22" height="14" rx="7" ry="7"/><circle cx="16" cy="12" r="3"/></svg>`,
        tof:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="22" height="14" rx="7" ry="7"/><circle cx="8" cy="12" r="3"/></svg>`,
    };

    // ============================================================
    // STATE
    // ============================================================
    let S={isClean:true,view:'overview',tab:'teams',team:null,emp:null};
    const T=getTeams();

    // ============================================================
    // HELPERS
    // ============================================================
    function e(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
    function cb(v,sm){const l=v>=0.75?'high':v>=0.50?'medium':'low',lb=v>=0.75?'Verified':v>=0.50?'Estimated':'Insufficient',c={high:{b:'#F0FDF4',c:'#16A34A',d:'#BBF7D0'},medium:{b:'#FFFBEB',c:'#D97706',d:'#FDE68A'},low:{b:'#FEF2F2',c:'#DC2626',d:'#FECACA'}}[l],s=sm==='sm';return`<span style="display:inline-flex;align-items:center;gap:${s?3:4}px;background:${c.b};color:${c.c};border:1px solid ${c.d};border-radius:99px;padding:${s?'1px 6px':'2px 8px'};font-size:${s?10:11}px;font-weight:600;letter-spacing:0.02em;white-space:nowrap;"><span style="width:6px;height:6px;border-radius:50%;background:${c.c};flex-shrink:0;"></span>${lb}${s?'':(` · ${Math.round(v*100)}%`)}</span>`}
    function rc(r){return r>=70?'#16A34A':r>=50?'#D97706':'#DC2626'}
    function gc(g){return g>0.6?'#DC2626':g>0.4?'#D97706':'#16A34A'}
    function bc(m){return m>=0.8?'#16A34A':m>=0.6?'#0D9488':m>=0.4?'#D97706':'#DC2626'}
    function sl(s){return{lms_verified:'LMS',training_enriched:'Training',performance_correlated:'Perf.',role_inferred:'Inferred'}[s]||s}

    function getTeams(){const g={};ALL.forEach(emp=>{const k=`${emp.branch}|||${emp.department}`;if(!g[k])g[k]={branch:emp.branch,department:emp.department,members:[]};g[k].members.push(emp)});return Object.values(g).map(t=>{const ag=t.members.reduce((s,x)=>s+x.clean.gap_score,0)/t.members.length,ac=t.members.reduce((s,x)=>s+x.clean.profile_confidence,0)/t.members.length,cg=t.members.filter(x=>x.clean.gap_score>0.6&&x.clean.profile_confidence>0.5).length,nr=t.members.filter(x=>x.clean.needs_review).length,rd=Math.round((1-ag)*100),hc=t.members.filter(x=>x.clean.profile_confidence>=0.75).length;return{...t,avgGap:ag,avgConf:ac,criticalGaps:cg,needsReview:nr,readiness:rd,highConf:hc}}).filter(t=>t.members.length>=2).sort((a,b)=>b.criticalGaps-a.criticalGaps)}

    function stats(){const hc=ALL.filter(x=>x.clean.profile_confidence>=0.75).length,rv=ALL.filter(x=>x.clean.needs_review).length,cg=ALL.filter(x=>x.clean.gap_score>0.6&&x.clean.profile_confidence>0.5).length,ws=ALL.filter(x=>x.messy.skills).length;return{hc,rv,cg,ws}}

    // ============================================================
    // RENDERERS
    // ============================================================
    function rHeader(){const c=S.isClean,bg=c?'#CCFBF1':'#FEF2F2',bd=c?'#99F6E4':'#FECACA',cl=c?'#0F766E':'#DC2626',ic=c?I.ton:I.tof,lb=c?'Clean Dataset (Post-Contextualization)':'Messy Dataset (Enterprise Reality)';return`<div style="background:#FFF;border-bottom:1px solid #E1E4E8;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px;"><div style="display:flex;align-items:center;gap:12px;"><div style="width:28px;height:28px;border-radius:6px;background:#0D9488;display:flex;align-items:center;justify-content:center;color:white;">${I.tu}</div><div><div style="font-size:14px;font-weight:700;line-height:1.2;">Workforce Intelligence</div><div style="font-size:10px;color:#8B949E;letter-spacing:0.03em;">Medika Nusantara · Skill Gap Analysis PoC</div></div></div><button onclick="tog()" style="display:inline-flex;align-items:center;gap:8px;background:${bg};border:1.5px solid ${bd};border-radius:99px;padding:6px 16px;cursor:pointer;font-size:13px;font-weight:600;color:${cl};">${ic} ${lb}</button></div>`}

    function rMC(icon,label,value,sub){return`<div style="background:#FFF;border:1px solid #E1E4E8;border-radius:10px;padding:18px 20px;flex:1;min-width:160px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><div style="width:32px;height:32px;border-radius:8px;background:#CCFBF1;display:flex;align-items:center;justify-content:center;color:#0D9488;">${icon}</div><span style="font-size:12px;color:#57606A;font-weight:500;">${label}</span></div><div style="font-size:28px;font-weight:700;line-height:1.1;">${value}</div>${sub?`<div style="font-size:11px;color:#8B949E;margin-top:4px;">${sub}</div>`:''}</div>`}

    function rBanner(){if(!S.isClean)return`<div style="background:linear-gradient(135deg,#FEF2F2,#FFFBEB);border:1px solid #FECACA;border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;"><span style="color:#DC2626;flex-shrink:0;">${I.alert}</span><div><div style="font-size:13px;font-weight:600;color:#DC2626;">You're viewing raw enterprise data</div><div style="font-size:12px;color:#92400E;margin-top:2px;">40% of skill fields are missing. Job titles are inconsistent across branches. No confidence scoring. Toggle to clean data to see the difference.</div></div></div>`;return`<div style="background:linear-gradient(135deg,#F0FDF4,#CCFBF1);border:1px solid #BBF7D0;border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;"><span style="color:#16A34A;flex-shrink:0;">${I.check}</span><div><div style="font-size:13px;font-weight:600;color:#16A34A;">Contextualized data — ready for analysis</div><div style="font-size:12px;color:#166534;margin-top:2px;">Identities resolved across 3 systems. Job titles normalized. Skills inferred where missing. Every insight carries a confidence score.</div></div></div>`}

    function rTeams(){const c=S.isClean;return`<div style="margin-bottom:20px;"><h2 style="font-size:18px;font-weight:700;margin:0;">Team Skill Readiness</h2><p style="font-size:13px;color:#57606A;margin:4px 0 0;">${c?'Contextualized analysis with confidence scoring':'Raw data — notice lower confidence and missing assessments'}</p></div><div style="display:flex;flex-direction:column;gap:1px;background:#E1E4E8;border-radius:10px;overflow:hidden;border:1px solid #E1E4E8;"><div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 40px;padding:10px 16px;background:#F6F8FA;gap:8px;" class="grid-teams">${["Team","Readiness","Critical Gaps","Data Quality","Review",""].map(h=>`<span style="font-size:10px;font-weight:600;color:#8B949E;text-transform:uppercase;letter-spacing:0.06em;">${h}</span>`).join('')}</div>${T.map((t,i)=>{const dr=c?t.readiness:Math.max(15,t.readiness-15-(i*3%20)),clr=rc(dr);return`<div class="row-hover grid-teams" onclick="selT(${i})" style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 40px;padding:14px 16px;background:#FFF;gap:8px;cursor:pointer;align-items:center;"><div><div style="font-size:13px;font-weight:600;">${e(t.branch)}</div><div style="font-size:11px;color:#8B949E;">${e(t.department)} · ${t.members.length} members</div></div><div style="display:flex;align-items:center;gap:8px;"><div class="bar-track" style="width:60px;"><div class="bar-fill" style="width:${dr}%;background:${clr};"></div></div><span style="font-size:12px;font-weight:600;color:${clr};font-family:'JetBrains Mono',monospace;min-width:32px;">${dr}%</span></div><div>${c?`<span style="font-size:13px;font-weight:600;color:${t.criticalGaps>0?'#DC2626':'#16A34A'};font-family:'JetBrains Mono',monospace;">${t.criticalGaps}</span>`:`<span style="font-size:11px;color:#8B949E;font-style:italic;">Unknown</span>`}</div><div>${c?cb(t.avgConf,'sm'):`<span style="font-size:10px;color:#DC2626;background:#FEF2F2;padding:2px 6px;border-radius:4px;">No scoring</span>`}</div><div><span style="font-size:12px;color:${t.needsReview>0?'#D97706':'#8B949E'};font-weight:${t.needsReview>0?600:400};font-family:'JetBrains Mono',monospace;">${t.needsReview}</span></div><span style="color:#8B949E;">${I.cr}</span></div>`}).join('')}</div>`}

    function rReview(){if(!S.isClean)return`<div style="text-align:center;padding:40px;"><span style="color:#8B949E;">${I.alert}</span><div style="font-size:14px;color:#57606A;margin-top:12px;">Human review queue not available on raw data</div><div style="font-size:12px;color:#8B949E;margin-top:4px;">Switch to clean dataset to see flagged profiles</div></div>`;const ri=ALL.filter(x=>x.clean.needs_review);return`<div style="margin-bottom:16px;"><h2 style="font-size:18px;font-weight:700;margin:0;">Human Review Queue</h2><p style="font-size:13px;color:#57606A;margin:4px 0 0;">${ri.length} profiles need attention</p></div><div style="display:flex;flex-direction:column;gap:8px;">${ri.slice(0,20).map(x=>`<div class="card-hover" onclick="selE(${x.id-1})" style="background:#FFF;border:1px solid #E1E4E8;border-radius:8px;padding:14px;cursor:pointer;transition:border-color 0.15s;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px;"><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:13px;font-weight:600;">${e(x.name)}</span>${cb(x.clean.profile_confidence,'sm')}</div><span style="font-size:11px;color:#8B949E;font-family:'JetBrains Mono',monospace;">${x.canonical_id}</span></div><div style="font-size:12px;color:#57606A;margin-bottom:6px;">${e(x.standard_role)} · ${e(x.branch)}</div><div style="display:flex;gap:6px;flex-wrap:wrap;">${x.clean.review_flags.map(f=>`<span style="font-size:10px;background:#FFFBEB;color:#92400E;padding:2px 8px;border-radius:4px;border:1px solid #FDE68A;">${e(f)}</span>`).join('')}</div></div>`).join('')}</div>`}

    function rTD(){const t=S.team,c=S.isClean;return`<button onclick="bkO()" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:13px;color:#57606A;padding:0;margin-bottom:16px;">${I.al} Back to overview</button><div style="margin-bottom:16px;"><h2 style="font-size:18px;font-weight:700;margin:0;">${e(t.branch)} · ${e(t.department)}</h2><p style="font-size:13px;color:#57606A;margin:4px 0 0;">${t.members.length} members${c?` · ${t.highConf} high-confidence profiles`:' · Data quality unknown'}</p></div><div style="display:flex;flex-direction:column;gap:1px;background:#E1E4E8;border-radius:10px;overflow:hidden;border:1px solid #E1E4E8;"><div style="display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 40px;padding:10px 16px;background:#F6F8FA;gap:8px;" class="grid-employee">${[" Employee",c?"Standard Role":"Job Title","Gap","Confidence","Status",""].map(h=>`<span style="font-size:10px;font-weight:600;color:#8B949E;text-transform:uppercase;letter-spacing:0.06em;">${h}</span>`).join('')}</div>${t.members.map(x=>`<div class="row-hover grid-employee" onclick="selE(${x.id-1})" style="display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 40px;padding:12px 16px;background:#FFF;gap:8px;cursor:pointer;align-items:center;"><div><div style="font-size:13px;font-weight:500;">${e(x.name)}</div><div style="font-size:11px;color:#8B949E;font-family:'JetBrains Mono',monospace;">${x.canonical_id}</div></div><div style="font-size:12px;color:#57606A;">${c?e(x.standard_role):e(x.messy.job_title)}</div><div>${c?`<span style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:${gc(x.clean.gap_score)};">${Math.round(x.clean.gap_score*100)}%</span>`:`<span style="font-size:11px;color:#8B949E;font-style:italic;">—</span>`}</div><div>${c?cb(x.clean.profile_confidence,'sm'):`<span style="font-size:10px;color:#8B949E;">N/A</span>`}</div><div>${c&&x.clean.needs_review?`<span style="font-size:10px;color:#D97706;background:#FFFBEB;padding:2px 6px;border-radius:4px;font-weight:600;">Review</span>`:c?`<span style="font-size:10px;color:#16A34A;background:#F0FDF4;padding:2px 6px;border-radius:4px;font-weight:600;">Ready</span>`:`<span style="font-size:10px;color:#8B949E;">—</span>`}</div><span style="color:#8B949E;">${I.cr}</span></div>`).join('')}</div>`}

    function rED(){const x=S.emp,c=S.isClean,rd=STANDARD_ROLES[x.standard_role],bf=S.team?'bkT()':'bkO()',bl=S.team?'Back to team':'Back to overview';
    let sk='';if(c){sk=x.clean.skills.map(s=>{const p=Math.round(s.matchScore*100);return`<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;margin-bottom:3px;align-items:center;"><span style="font-size:12px;font-weight:500;">${e(s.name)}</span><div style="display:flex;align-items:center;gap:6px;"><span style="font-size:9px;color:#8B949E;font-family:'JetBrains Mono',monospace;background:#F3F4F6;padding:1px 5px;border-radius:3px;">${sl(s.source)}</span><span style="font-size:11px;color:#57606A;font-family:'JetBrains Mono',monospace;font-weight:600;">${p}%</span></div></div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${bc(s.matchScore)};"></div></div></div>`}).join('')}else if(x.messy.skills){sk=x.messy.skills.map(s=>`<div style="font-size:12px;padding:4px 0;border-bottom:1px solid #F0F1F3;">${e(s.name)} ${s.level!==null?`<span style="font-family:'JetBrains Mono',monospace;color:#8B949E;">Level: ${s.level}</span>`:`<span style="color:#8B949E;font-style:italic;">— no level</span>`}</div>`).join('')}else{sk=`<div style="font-size:12px;color:#DC2626;font-style:italic;background:#FEF2F2;padding:10px;border-radius:6px;">No skill records found in HRIS</div>`}
    let ch=c?x.clean.skills.map(s=>{const rp=(s.weight/5)*100,cp=(s.matchScore*s.weight/5)*100,nm=s.name.length>18?s.name.slice(0,16)+'…':s.name;return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><div style="width:120px;font-size:11px;color:#57606A;text-align:right;flex-shrink:0;">${e(nm)}</div><div style="flex:1;position:relative;height:16px;"><div style="position:absolute;top:2px;left:0;width:${rp}%;height:5px;background:#E5E7EB;border-radius:99px;"></div><div style="position:absolute;top:9px;left:0;width:${cp}%;height:5px;background:#0D9488;border-radius:99px;transition:width 0.5s;"></div></div><div style="width:36px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#57606A;">${s.weight}/${Math.round(s.matchScore*s.weight*10)/10}</div></div>`}).join(''):(rd?rd.skills:[]).map((s,i)=>{const rp=(rd.weights[i]/5)*100,nm=s.length>18?s.slice(0,16)+'…':s;return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><div style="width:120px;font-size:11px;color:#57606A;text-align:right;flex-shrink:0;">${e(nm)}</div><div style="flex:1;position:relative;height:16px;"><div style="position:absolute;top:2px;left:0;width:${rp}%;height:5px;background:#E5E7EB;border-radius:99px;"></div><div style="position:absolute;top:9px;left:0;width:3%;height:5px;background:#D1D5DB;border-radius:99px;"></div></div></div>`}).join('');
    if(c)ch=`<div style="margin-bottom:8px;display:flex;gap:12px;font-size:10px;color:#8B949E;"><span><span style="display:inline-block;width:12px;height:4px;background:#E5E7EB;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>Required</span><span><span style="display:inline-block;width:12px;height:4px;background:#0D9488;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>Current</span></div>${ch}`;else ch+=`<div style="margin-top:16px;padding:12px;background:#F6F8FA;border-radius:8px;text-align:center;"><span style="color:#8B949E;">${I.alert}</span><div style="font-size:12px;color:#8B949E;margin-top:4px;">Cannot generate skill gap analysis — insufficient data</div></div>`;
    let fl='';if(c&&x.clean.review_flags.length>0)fl=`<div style="margin-top:16px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:12px;"><div style="font-size:11px;font-weight:600;color:#D97706;margin-bottom:6px;">Review Flags</div>${x.clean.review_flags.map(f=>`<div style="font-size:12px;color:#92400E;display:flex;align-items:center;gap:6px;margin-bottom:2px;">${I.ac} ${e(f)}</div>`).join('')}</div>`;
    let ac='';if(c){ac=x.clean.profile_confidence>=0.5?`<div style="display:flex;gap:8px;margin-top:20px;"><button style="flex:1;padding:10px 16px;background:#0D9488;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Add to Reskilling Plan</button><button style="padding:10px 16px;background:#FFF;color:#57606A;border:1px solid #E1E4E8;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;">Override</button></div>`:`<div style="display:flex;gap:8px;margin-top:20px;"><button style="flex:1;padding:10px 16px;background:#FFFBEB;color:#D97706;border:1px solid #FDE68A;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Complete This Profile</button><button style="padding:10px 16px;background:#FFF;color:#57606A;border:1px solid #E1E4E8;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;">Override</button></div>`}
    let wh='';if(c)wh=`<details style="margin-top:16px;"><summary style="font-size:12px;color:#0D9488;font-weight:500;">▸ Why this assessment?</summary><div style="margin-top:8px;font-size:11px;color:#57606A;line-height:1.6;">${x.clean.skills.map(s=>`<div><strong>${e(s.name)}:</strong> ${{lms_verified:'Verified via LMS course completion',training_enriched:'Inferred from training history',performance_correlated:'Correlated with performance data',role_inferred:'Inferred from role requirements'}[s.source]} (${Math.round(s.matchScore*100)}%)</div>`).join('')}</div></details>`;
    let tg='';if(c&&x.clean.top_gaps.length>0)tg=`<div style="margin-top:16px;padding:12px;background:#FEF2F2;border-radius:8px;border:1px solid #FECACA;"><div style="font-size:11px;font-weight:600;color:#DC2626;margin-bottom:4px;">Priority Gaps</div>${x.clean.top_gaps.map(g=>`<div style="font-size:12px;color:#991B1B;">${e(g)}</div>`).join('')}</div>`;
    let cd='';if(c&&x.messy.has_conflicting_date)cd=`<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px;margin-bottom:16px;font-size:12px;color:#D97706;display:flex;align-items:center;gap:8px;">${I.alert} Conflicting hire dates: HRIS says ${x.hire_date}, ATS says ${x.messy.ats_hire_date}</div>`;
    return`<button onclick="${bf}" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:13px;color:#57606A;padding:0;margin-bottom:16px;">${I.al} ${bl}</button><div style="display:flex;gap:20px;flex-wrap:wrap;" class="detail-flex"><div style="flex:1 1 340px;background:#FFF;border:1px solid #E1E4E8;border-radius:10px;padding:20px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px;"><div><h3 style="font-size:18px;font-weight:700;margin:0;">${e(x.name)}</h3><div style="font-size:12px;color:#57606A;margin-top:2px;">${c?e(x.standard_role):e(x.messy.job_title)} · ${e(x.branch)}</div></div>${c?cb(x.clean.profile_confidence):''}</div><div style="background:#F6F8FA;border-radius:8px;padding:12px;margin-bottom:16px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#57606A;"><div style="margin-bottom:4px;">HRIS: <span style="color:#1B1F24;">${x.messy.hris_id}</span></div><div style="margin-bottom:4px;">ATS: <span style="color:${x.messy.ats_id?'#1B1F24':'#8B949E'};">${x.messy.ats_id||'No record'}</span></div><div style="margin-bottom:4px;">LMS: <span style="color:${x.messy.lms_email?'#1B1F24':'#8B949E'};">${x.messy.lms_email||'No record'}</span></div>${c?`<div style="margin-top:6px;padding-top:6px;border-top:1px solid #E1E4E8;">Canonical: <span style="color:#0D9488;font-weight:600;">${x.canonical_id}</span><span style="margin-left:8px;">Match: ${Math.round(x.clean.identity_confidence*100)}%</span></div>`:''}</div>${cd}${c?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div style="font-size:12px;font-weight:600;color:#57606A;text-transform:uppercase;letter-spacing:0.05em;">Skill Assessment</div><div style="font-size:11px;font-family:'JetBrains Mono',monospace;">Gap: <span style="font-weight:700;color:${gc(x.clean.gap_score)};">${Math.round(x.clean.gap_score*100)}%</span></div></div>`:`<div style="font-size:12px;font-weight:600;color:#57606A;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;">Raw Skill Data</div>`}${sk}${!c&&x.messy.performance?`<div style="margin-top:12px;font-size:12px;color:#57606A;">Performance (${x.messy.performance.year}): <span style="font-family:'JetBrains Mono',monospace;color:#1B1F24;">${x.messy.performance.rating}</span> <span style="color:#8B949E;font-style:italic;">(raw)</span></div>`:''}${!c&&!x.messy.performance?`<div style="margin-top:12px;font-size:12px;color:#8B949E;font-style:italic;">No performance data</div>`:''}${c&&x.clean.normalized_performance?`<div style="margin-top:12px;font-size:12px;color:#57606A;">Normalized Performance: <span style="font-weight:600;color:#1B1F24;">${x.clean.normalized_performance}</span></div>`:''}${fl}${ac}</div><div style="flex:1 1 340px;background:#FFF;border:1px solid #E1E4E8;border-radius:10px;padding:20px;"><div style="font-size:12px;font-weight:600;color:#57606A;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;">Required vs. Current Skill Level</div>${ch}${tg}${wh}</div></div>`}

    // ============================================================
    // MAIN RENDER
    // ============================================================
    function render(){const a=document.getElementById('app');const st=stats();if(S.view==='overview'){const ta=S.tab==='teams',ra=S.tab==='review',c=S.isClean;a.innerHTML=rHeader()+`<div style="max-width:1080px;margin:0 auto;padding:20px 24px;"><div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;" class="metrics-row">${rMC(I.users,'Total Employees',ALL.length,'200 in PoC sample')}${rMC(c?I.shield:I.alert,c?'High Confidence':'Has Skill Data',c?st.hc:st.ws,c?`${Math.round(st.hc/ALL.length*100)}% of sample`:`${Math.round(st.ws/ALL.length*100)}% — 40% missing`)}${rMC(c?I.check:I.ac,c?'Critical Skill Gaps':'Gap Analysis',c?st.cg:'—',c?'Need urgent reskilling':'Cannot compute without clean data')}${rMC(I.eye,'Review Queue',c?st.rv:'—',c?'Flagged for human review':'Not available on raw data')}</div>${rBanner()}<div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid #E1E4E8;"><button onclick="stab('teams')" style="display:flex;align-items:center;gap:6px;padding:10px 16px;background:none;border:none;border-bottom:2px solid ${ta?'#0D9488':'transparent'};color:${ta?'#0D9488':'#57606A'};font-size:13px;font-weight:${ta?600:400};cursor:pointer;">${I.users} Team Overview</button><button onclick="stab('review')" style="display:flex;align-items:center;gap:6px;padding:10px 16px;background:none;border:none;border-bottom:2px solid ${ra?'#0D9488':'transparent'};color:${ra?'#0D9488':'#57606A'};font-size:13px;font-weight:${ra?600:400};cursor:pointer;">${I.eye} Review Queue${c?` (${st.rv})`:''}</button></div>${ta?rTeams():rReview()}</div><div style="text-align:center;padding:20px 24px;font-size:11px;color:#8B949E;">Rakamin Workforce Intelligence Platform · Medika Nusantara PoC · 200-employee sample · Synthetic data</div>`}else if(S.view==='team'){a.innerHTML=rHeader()+`<div style="max-width:1080px;margin:0 auto;padding:20px 24px;">${rTD()}</div>`}else if(S.view==='employee'){a.innerHTML=rHeader()+`<div style="max-width:1080px;margin:0 auto;padding:20px 24px;">${rED()}</div>`}}

    // ============================================================
    // ACTIONS
    // ============================================================
    function tog(){S.isClean=!S.isClean;render()}
    function stab(t){S.tab=t;render()}
    function selT(i){S.team=T[i];S.view='team';render();window.scrollTo(0,0)}
    function selE(i){S.emp=ALL[i];S.view='employee';render();window.scrollTo(0,0)}
    function bkO(){S.view='overview';S.team=null;S.emp=null;render();window.scrollTo(0,0)}
    function bkT(){S.view='team';S.emp=null;render();window.scrollTo(0,0)}

    render();
    </script>
</body>
</html>
